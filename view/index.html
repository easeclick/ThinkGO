<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - ThinkGo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 28px; margin-bottom: 10px; color: #1a1a1a; }
        p { font-size: 16px; line-height: 1.6; color: #666; }
        .info { margin-top: 20px; padding: 15px; background: #f0f7ff; border-radius: 6px; }
        .info dt { font-weight: bold; color: #0066cc; margin-top: 10px; }
        .info dd { margin-left: 20px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>{{.Title}}</h1>
            <p>{{.Message}}</p>
            <div class="info">
                <dl>
                    <dt>Framework</dt>
                    <dd>ThinkGo v1.0.0</dd>
                    <dt>Engine</dt>
                    <dd>Go net/http + GORM</dd>
                    <dt>Time</dt>
                    <dd>{{.Time}}</dd>
                </dl>
            </div>
        </div>
    </div>
</body>
</html>
